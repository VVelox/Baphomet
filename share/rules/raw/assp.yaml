---
# Matches ASSP (Anti-Spam SMTP Proxy) auth failures, failed SSL
# negotiations, AUTH error blocks, and relay attempts, for both ASSP V1
# and V2. Based on the fail2ban assp filter, translated to Baphomet and
# simplified. ASSP leads each line with its own Mon-DD-YY HH:MM:SS
# timestamp, so this is a raw rule anchored on that shape.
rev: 1
msg: "[ASSP] auth failure / spam reject"
severity: high
classtype: brute-force
message_regexp:
  - '^\w{3}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?: \[SSL-out\])? %%%%SRC%%%% max sender authentication errors \(\d{1,3}\) exceeded -- (?:dropping|refusing) connection - after reply: \d{3} \d\.\d\.\d Error: authentication failed: \w+;$'
  - '^\w{3}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?: \[SSL-out\])? %%%%SRC%%%% SSL negotiation with client failed: SSL accept attempt failed with unknown error.*:unknown protocol;$'
  - '^\w{3}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} Blocking %%%%SRC%%%% - too much AUTH errors \(\d{1,3}\);$'
  - '^\w{3}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\s*(?:[\w\-]+\s+)*(?:\[\S+\]\s+)*%%%%SRC%%%% (?:\<\S+@\S+\.\S+\> )*(?:to: \S+@\S+\.\S+ )*relay attempt blocked for(?: \(parsing\))?: \S+$'
  - '^\w{3}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\s*(?:[\w\-]+\s+)*(?:\[\S+\]\s+)*%%%%SRC%%%% \[SMTP Error\] 535 5\.7\.8 Error: authentication failed:\s*(?:\S+|Connection lost to authentication server|Invalid authentication mechanism|Invalid base64 data in continued response)?$'
ban_var:
  - SRC
tests:
  positive:
    - message: "Apr-27-13 02:25:10 [SSL-out] 217.194.197.97 max sender authentication errors (5) exceeded -- dropping connection - after reply: 535 5.7.8 Error: authentication failed: UGFzc3dvcmQ6;"
      found: 1
      data:
        SRC: "217.194.197.97"
    - message: "Apr-07-13 07:08:36 [SSL-out] 68.171.223.68 SSL negotiation with client failed: SSL accept attempt failed with unknown errorerror:140760FC:SSL routines:SSL23_GET_CLIENT_HELLO:unknown protocol;"
      found: 1
      data:
        SRC: "68.171.223.68"
    - message: "Apr-27-13 02:25:09 Blocking 217.194.197.97 - too much AUTH errors (8);"
      found: 1
      data:
        SRC: "217.194.197.97"
    - message: "Jul-29-16 16:49:52 m1-25391-06124 [Worker_1] [TLS-out] [RelayAttempt] 0.0.0.0 <user@example.com> to: user@example.org relay attempt blocked for: someone@example.org"
      found: 1
      data:
        SRC: "0.0.0.0"
    - message: "Jul-30-16 17:07:25 [Worker_1] [TLS-out] 0.0.0.0 [SMTP Error] 535 5.7.8 Error: authentication failed: UGFzc3dvcmQ6"
      found: 1
      data:
        SRC: "0.0.0.0"
    - message: "Jul-31-16 06:45:59 [Worker_1] [TLS-in] [TLS-out] 0.0.0.0 [SMTP Error] 535 5.7.8 Error: authentication failed: "
      found: 1
      data:
        SRC: "0.0.0.0"
  negative:
    - message: "Apr-27-13 02:25:10 [SSL-out] 217.194.197.97 accepted connection"
      found: 0
      undefed: ["SRC"]
