---
# Matches 3proxy denied connections... its log carries a five digit
# status where a non-zero final digit is a error, most relevantly 1
# for auth failure. Based on the fail2ban 3proxy filter, translated to
# Baphomet and simplified.
msg: "[3PROXY] denied connection / auth failure"
severity: high
classtype: brute-force
message_regexp:
  - '^\d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2} [+-]\d{4} \S+ \d{3}0[1-9] \S+ %%%%SRC%%%%:\d+ [\d.]+:\d+ \d+ \d+ \d+\s'
ban_var:
  - SRC
tests:
  positive:
    - message: "11-06-2013 02:09:40 +0300 PROXY.3128 00004 - 1.2.3.4:28783 0.0.0.0:0 0 0 0 GET http://www.yandex.ua/?ncrnd=2169807731 HTTP/1.1"
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "11-06-2013 02:09:43 +0300 PROXY.3128 00005 ewr 1.2.3.4:28788 0.0.0.0:0 0 0 0 GET http://www.yandex.ua/?ncrnd=2169807731 HTTP/1.1"
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "13-06-2013 01:39:34 +0300 PROXY.3128 00508 - 1.2.3.4:28938 0.0.0.0:0 0 0 0 "
      found: 1
      data:
        SRC: "1.2.3.4"
  negative:
    # a zero error code is a served request
    - message: "11-06-2013 02:09:44 +0300 PROXY.3128 00000 - 192.0.2.7:28790 203.0.113.5:80 512 2048 1 GET http://example.com/ HTTP/1.1"
      found: 0
      undefed: ["SRC"]
