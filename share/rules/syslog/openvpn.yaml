---
# Matches OpenVPN authentication and TLS handshake failures. No fail2ban
# filter exists for this, so it is modelled on Sagan's openvpn.rules and
# OpenVPN's own server output. Requires OpenVPN to log through syslog
# (`--syslog openvpn`, or a systemd unit with SyslogIdentifier=openvpn).
# Multi-client server lines are prefixed with the peer's <ip>:<port>; the
# username/password verify failure carries the offender only in that prefix,
# so those patterns anchor on it. The pre-auth TLS error names the address
# after `from [AF_INET]` instead.
msg: "[OPENVPN] auth / TLS handshake failure"
severity: high
classtype: brute-force
daemons:
  - openvpn
message_regexp:
  - '^%%%%SRC%%%%:\d+ TLS Auth Error: Auth Username/Password verification failed for peer'
  - '^%%%%SRC%%%%:\d+ Decrypt packet error'
  - 'TLS Error: incoming packet authentication failed from \[AF_INET\]%%%%SRC%%%%:\d+'
ban_var:
  - SRC
tests:
  positive:
    - message: "Jul 14 08:15:50 vpngw openvpn[1234]: 203.0.113.10:56010 TLS Auth Error: Auth Username/Password verification failed for peer {{ Common Name }} [peer]"
      found: 1
      data:
        SRC: "203.0.113.10"
    - message: "Jul 14 08:15:50 vpngw openvpn[1234]: 192.0.2.7:44321 Decrypt packet error: packet HMAC authentication failed"
      found: 1
      data:
        SRC: "192.0.2.7"
    - message: "Jul 14 08:15:50 vpngw openvpn[1234]: TLS Error: incoming packet authentication failed from [AF_INET]198.51.100.5:1194"
      found: 1
      data:
        SRC: "198.51.100.5"
    - message: "Jul 14 08:15:50 vpngw openvpn[1234]: 2001:db8::badc:0ffe:1194 Decrypt packet error: bad packet ID"
      found: 1
      data:
        SRC: "2001:db8::badc:0ffe"
  negative:
    - message: "Jul 14 08:16:00 vpngw openvpn[1234]: 203.0.113.10:56010 [client1] Peer Connection Initiated with [AF_INET]203.0.113.10:56010"
      found: 0
      undefed: ["SRC"]
    - message: "Jul 14 08:16:00 vpngw openvpn[1234]: Initialization Sequence Completed"
      found: 0
      undefed: ["SRC"]
    - message: "Jul 14 08:16:00 vpngw sshd[1]: 203.0.113.10:56010 Decrypt packet error: packet HMAC authentication failed"
      found: 0
      undefed: ["SRC"]
