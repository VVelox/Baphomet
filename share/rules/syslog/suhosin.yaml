---
# Matches suhosin PHP-hardening ALERT lines, logged either directly or
# through lighttpd's mod_fastcgi. Based on the fail2ban suhosin filter,
# translated to Baphomet and simplified.
rev: 1
msg: "[SUHOSIN] script attack alert"
severity: critical
classtype: web-application-attack
daemons:
  - lighttpd
  - suhosin
message_regexp:
  - '^(?:\(mod_fastcgi\.c\.\d+\) FastCGI-stderr:\s)?ALERT - .*? \(attacker ''%%%%SRC%%%%'', file ''[^'']*''(?:, line \d+)?\)$'
ban_var:
  - SRC
tests:
  positive:
    - message: "Mar 11 22:52:12   lighttpd[53690]: (mod_fastcgi.c.2676) FastCGI-stderr: ALERT - configured request variable name length limit exceeded - dropped variable 'upqchi07vFfAFuBjnIKGIwiLrHo3Vt68T3yqvhQu2TqetQ78roy7Q6bpTfDUtYFR593/MA' (attacker '198.51.100.167', file '/usr/local/captiveportal/index.php')"
      found: 1
      data:
        SRC: "198.51.100.167"
    - message: "Feb 26 22:52:29 host suhosin[9636]: ALERT - script tried to increase memory_limit to 268435456 bytes which is above the allowed value (attacker '198.51.100.77', file '/var/www/wordpress/wp-admin/includes/image.php', line 161)"
      found: 1
      data:
        SRC: "198.51.100.77"
    - message: "Nov 18 20:18:31 platypus suhosin[28433]: ALERT - ASCII-NUL chars not allowed within request variables - dropped variable 'templatefile' (attacker '188.132.244.3', file '/home/ace-hosting/public_html/cart.php')"
      found: 1
      data:
        SRC: "188.132.244.3"
    - message: "Oct 25 10:59:49 platypus suhosin[13953]: ALERT - configured GET variable value length limit exceeded - dropped variable '_route_' (attacker '38.111.147.83', file '/home/thegoblin/public_html/index.php')"
      found: 1
      data:
        SRC: "38.111.147.83"
  negative:
    - message: "Oct 25 11:00:00 platypus suhosin[13954]: NOTICE - request processed normally"
      found: 0
      undefed: ["SRC"]
