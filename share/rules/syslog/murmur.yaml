---
# Matches murmur/mumble-server rejected connections. Based on the fail2ban
# murmur filter, translated to Baphomet and simplified... the prefregex
# machinery is folded into each regexp and the murmur <W> timestamp that
# shows up when logging via syslog is handled as an optional inline prefix.
rev: 1
msg: "[MURMUR] rejected connection"
severity: high
classtype: brute-force
daemons:
  - murmurd
  - mumble-server
message_regexp:
  - '^(?:<W>[\d\-]+ [\d:]+\.\d+ )?\d+ => <\d+:[^>]+\(-1\)> Rejected connection from %%%%SRC%%%%:\d+: Invalid server password$'
  - '^(?:<W>[\d\-]+ [\d:]+\.\d+ )?\d+ => <\d+:[^>]+\(-1\)> Rejected connection from %%%%SRC%%%%:\d+: Wrong certificate or password for existing user$'
ban_var:
  - SRC
tests:
  positive:
    - message: "Jul 12 08:15:50 vixen42 murmurd[2064]: <W>2015-11-29 16:38:01.818 1 => <4:testUsernameOne(-1)> Rejected connection from 192.168.0.1:29530: Invalid server password"
      found: 1
      data:
        SRC: "192.168.0.1"
    - message: "Jul 12 08:15:50 vixen42 murmurd[2064]: 1 => <8:testUsernameTwo(-1)> Rejected connection from 192.168.1.2:29761: Wrong certificate or password for existing user"
      found: 1
      data:
        SRC: "192.168.1.2"
    - message: "Jul 12 08:15:50 vixen42 murmurd[2064]: <W>2019-09-08 13:00:05.615 1 => <10:Test(-1)> Rejected connection from 192.0.2.1:31752: Invalid server password"
      found: 1
      data:
        SRC: "192.0.2.1"
  negative:
    - message: "Jul 12 08:25:49 vixen42 murmurd[2064]: <W>2019-09-08 13:00:05.615 1 => <10:Test(-1)> New connection: 192.0.2.9:31752"
      found: 0
      undefed: ["SRC"]
    - message: "Jul 12 08:25:49 vixen42 murmurd[2064]: <W>2019-09-08 13:00:06.001 1 => <10:Test(-1)> Authenticated"
      found: 0
      undefed: ["SRC"]
