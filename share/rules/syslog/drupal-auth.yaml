---
# Matches Drupal login failures logged to syslog. Based on the fail2ban
# drupal-auth filter, translated to Baphomet and simplified.
#
# Drupal's syslog format is
# !base_url|!timestamp|!type|!ip|!request_uri|!referer|!uid|!link|!message
# and the daemon token varies with the site (example.com, drupal-site,
# drupal_site[pid]), so the daemon gate is left open and the pipe-delimited
# shape carries the specificity. The client IP is the fourth field, so
# %%%%SRC%%%% is anchored there rather than in the free-form message tail,
# which keeps a login name of "Login attempt failed from 1.2.3.4" from
# being mistaken for the offender.
rev: 1
msg: "[DRUPAL] login failure"
severity: high
classtype: brute-force
daemons:
  - //.//
message_regexp:
  - '^https?://[^|]+\|[^|]+\|[^|]+\|%%%%SRC%%%%\|(?:[^|]*\|)*Login attempt failed (?:for|from) [^|]+\.$'
ban_var:
  - SRC
tests:
  positive:
    - message: "Apr 26 13:15:25 webserver example.com: https://example.com|1430068525|user|1.2.3.4|https://example.com/?q=user|https://example.com/?q=user|0||Login attempt failed for drupaladmin."
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Apr 26 13:20:01 mweb drupal_site[24864]: https://www.example.com|1613058599|user|192.0.2.7|https://www.example.com/en/user/login|https://www.example.com/en/user/login|0||Login attempt failed from Jack Sparrow."
      found: 1
      data:
        SRC: "192.0.2.7"
    - message: "Apr 26 13:20:02 host drupal-site: https://example.com|1613063581|user|192.0.2.4|https://example.com/user/login?test=|&test2=||0||Login attempt failed from 192.0.2.4."
      found: 1
      data:
        SRC: "192.0.2.4"
  negative:
    - message: "Apr 26 13:19:08 webserver example.com: https://example.com|1430068748|user|1.2.3.4|https://example.com/user|https://example.com/user|1||Session opened for drupaladmin."
      found: 0
      undefed: ["SRC"]
    - message: "Apr 26 13:20:00 host drupal-site: https://example.com|1613063581|user|192.0.2.5|https://example.com/user/login?test=|&test2=|0||Login attempt failed for tester|2||Session revisited for drupaladmin."
      found: 0
      undefed: ["SRC"]
