---
# Matches vsftpd failures. Based on the fail2ban vsftpd filter, translated
# to Baphomet and simplified.
rev: 1
msg: "[VSFTPD] login failure"
severity: high
classtype: brute-force
daemons:
  - vsftpd
message_regexp:
  - '^\(?pam_unix(?:\(\S+\))?\)?:?\s+authentication failure; logname=\S* uid=\S* euid=\S* tty=(?:ftp)? ruser=\S* rhost=%%%%SRC%%%%(?:\s+user=.*)?\s*$'
  - '^(?:\[pid \d+\] )?\[[^\]]+\] FAIL LOGIN: Client "(?:::ffff:)?%%%%SRC%%%%"(?:\s*$|,)'
ban_var:
  - SRC
tests:
  positive:
    - message: "Oct 11 01:06:47 ServerJV vsftpd: (pam_unix) authentication failure; logname= uid=0 euid=0 tty= ruser= rhost=209.67.1.67"
      found: 1
      data:
        SRC: "209.67.1.67"
    - message: "Oct 23 21:15:42 vps vsftpd: pam_unix(vsftpd:auth): authentication failure; logname= uid=0 euid=0 tty=ftp ruser=test rhost=58.254.172.161"
      found: 1
      data:
        SRC: "58.254.172.161"
    - message: "Jul 12 08:15:50 vixen42 vsftpd[123]: [pid 27202] [anonymous] FAIL LOGIN: Client \"64.106.46.98\""
      found: 1
      data:
        SRC: "64.106.46.98"
    - message: "Jul 12 08:15:50 vixen42 vsftpd[123]: [pid 15019] [guest] FAIL LOGIN: Client \"::ffff:192.0.2.1\", \"User is not in the allow user list.\""
      found: 1
      data:
        SRC: "192.0.2.1"
  negative:
    - message: "Feb 6 12:02:29 server vsftpd(pam_unix)[15522]: authentication failure; logname= uid=0 euid=0 tty= ruser= rhost=64.168.103.1 user=user1"
      found: 0
      undefed: ["SRC"]
    - message: "Jul 12 08:15:50 vixen42 vsftpd[123]: [pid 15019] [kitsune] OK LOGIN: Client \"192.0.2.1\""
      found: 0
      undefed: ["SRC"]
