---
# Matches requests from known bad bots by user agent. Based on the
# fail2ban apache-badbots filter, translated to Baphomet and trimmed...
# the fail2ban list is largely 2007 vintage email harvesters, so this
# ships the still recognizable ones plus a few modern scanners, and is
# meant to be extended locally.
method:
  - GET
  - POST
  - HEAD
match:
  - field: user_agent
    regexp: '^(?:EmailCollector|WebEMailExtrac|TrackBack/1\.02|sogou music spider|(?:Mozilla/\d+\.\d+ )?Jorgee)$'
  - field: user_agent
    regexp: '^(?:atSpider/1\.0|autoemailspider|ContactBot/0\.2|ContentSmartz|DataCha0s/2\.0|EmailSiphon|EmailSpider|EmailWolf 1\.00|ExtractorPro|Guestbook Auto Submitter|LWP::Simple/\S+|Missigua Locator 1\.9|Mozilla/3\.0 \(compatible; Indy Library\)|Mozilla/4\.0 \(compatible; Advanced Email Extractor v2\.\S+\)|psycheclone|searchbot admin@google\.com|ShablastBot 1\.0|VadixBot|WebVulnCrawl\.unknown/1\.0 libwww-perl/5\.803)$'
  - field: user_agent
    regexp: '(?i:masscan|zgrab|sqlmap|nikto|nuclei|gobuster|feroxbuster|wpscan)'
# fail2ban jail.conf's word for this filter, honored when the kur allows
# per-rule thresholds
max_retrys: 1
tests:
  positive:
    - message: '1.2.3.4 - - [05/Mar/2007:14:39:21 +0100] "POST /123.html/trackback/ HTTP/1.0" 301 459 "http://www.mydomain.tld/123.html/trackback" "TrackBack/1.02"'
      found: 1
      data:
        host: "1.2.3.4"
    - message: '1.2.3.4 - - [05/Mar/2007:14:41:21 +0100] "HEAD /123.html/trackback/ HTTP/1.0" 301 459 "http://www.mydomain.tld/123.html/trackback" "TrackBack/1.02"'
      found: 1
      data:
        host: "1.2.3.4"
    - message: '203.0.113.9 - - [12/Jul/2026:08:15:50 -0500] "GET /robots.txt HTTP/1.1" 200 196 "-" "Mozilla/5.0 zgrab/0.x"'
      found: 1
      data:
        host: "203.0.113.9"
    - message: '203.0.113.10 - - [12/Jul/2026:08:15:51 -0500] "GET / HTTP/1.1" 200 5120 "-" "EmailSiphon"'
      found: 1
      data:
        host: "203.0.113.10"
  negative:
    - message: '198.51.100.7 - - [12/Jul/2026:08:15:51 -0500] "GET /index.html HTTP/1.1" 200 5120 "-" "Mozilla/5.0 (X11; FreeBSD amd64; rv:109.0) Gecko/20100101 Firefox/115.0"'
      found: 0
      undefed: ["host"]
    # no user agent field at all... plain CLF
    - message: '198.51.100.8 - - [12/Jul/2026:08:15:52 -0500] "GET /index.html HTTP/1.1" 200 5120'
      found: 0
      undefed: ["host"]
    # the anchored 2007 list must not fire on substrings
    - message: '198.51.100.9 - - [12/Jul/2026:08:15:53 -0500] "GET / HTTP/1.1" 200 512 "-" "Mozilla/5.0 compatible; EmailSiphon fan club"'
      found: 0
      undefed: ["host"]
