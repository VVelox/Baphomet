---
# Matches asterisk auth/registration failures. Based on the fail2ban
# asterisk filter, translated to Baphomet and simplified... the prefregex
# machinery is folded into each regexp as a common asterisk log prefix and
# only the syslog-shaped form is handled. The fail2ban filter's ignoreregex
# is empty, so there is no ignore_regexp here.
daemons:
  - asterisk
message_regexp:
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? Registration from ''[^'']*'' failed for ''\[?%%%%SRC%%%%\]?(?::\d+)?'' - (?:Wrong password|Username/auth name mismatch|No matching peer found|Not a local domain|Device does not match ACL|Peer is not supposed to register|ACL error \(permit/deny\))$'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? Call from ''[^'']*'' \((?:(?:TCP|UDP):)?\[?%%%%SRC%%%%\]?:\d+\) to extension ''[^'']*'' rejected because extension not found in context'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? (?:Host )?%%%%SRC%%%% (?:failed (?:to authenticate\b|MD5 authentication\b)|tried to authenticate with nonexistent user\b)'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? No registration for peer ''[^'']*'' \(from %%%%SRC%%%%\)$'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? hacking attempt detected ''%%%%SRC%%%%''$'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? SecurityEvent="(?:FailedACL|InvalidAccountID|ChallengeResponseFailed|InvalidPassword)"(?:(?:,(?!RemoteAddress=)\w+="[^"]*")*|.*?),RemoteAddress="IPV[46]/[^/"]+/%%%%SRC%%%%/\d+"(?:,(?!RemoteAddress=)\w+="[^"]*")*$'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? "Rejecting unknown SIP connection from \[?%%%%SRC%%%%\]?(?::\d+)?"$'
  - '^(?:NOTICE|SECURITY|WARNING)\s*\[\d+\]:?(?:\[C-[\da-f]*\])?:? [^:]+:\d*(?:(?: in)? [^:]+:)? Request (?:''[^'']*'' )?from ''(?:[^'']*|.*?)'' failed for ''\[?%%%%SRC%%%%\]?(?::\d+)?''\s\(callid: [^\)]*\) - (?:No matching endpoint found|Not match Endpoint(?: Contact)? ACL|(?:Failed|Error) to authenticate)\s*$'
ban_var:
  - SRC
# fail2ban jail.conf's word for this filter, honored when the kur allows
# per-rule thresholds
max_retrys: 10
tests:
  positive:
    - message: "Nov 4 18:30:40 localhost asterisk[32229]: NOTICE[32257]: chan_sip.c:23417 in handle_request_register: Registration from '<sip:301@example.com>' failed for '192.168.200.100:36998' - Wrong password"
      found: 1
      data:
        SRC: "192.168.200.100"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[436][C-00000fa9] chan_sip.c: Call from '' (1.2.3.4:10836) to extension '0972598285108' rejected because extension not found in context 'default'."
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[12049]: res_pjsip_session.c:2337 new_invite: Call from 'anonymous' (TCP:[1.2.3.4]:61470) to extension '9011+442037690237' rejected because extension not found in context 'default'."
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[1638] chan_iax2.c: Host 1.2.3.4 failed to authenticate as 'Fail2ban'"
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE [22382] manager.c: 192.0.2.1 failed to authenticate as 'admin'"
      found: 1
      data:
        SRC: "192.0.2.1"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[31554] manager.c: 192.0.2.4 tried to authenticate with nonexistent user 'opennms'"
      found: 1
      data:
        SRC: "192.0.2.4"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[1638] chan_iax2.c: No registration for peer 'Fail2ban' (from 1.2.3.4)"
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[3453] chan_sip.c: hacking attempt detected '192.168.2.102'"
      found: 1
      data:
        SRC: "192.168.2.102"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: SECURITY[3308] res_security_log.c: SecurityEvent=\"InvalidPassword\",EventTV=\"1373098165-824497\",Severity=\"Error\",Service=\"SIP\",EventVersion=\"2\",AccountID=\"972592891005\",SessionID=\"0x88aab6c\",LocalAddress=\"IPV4/UDP/92.28.73.180/5060\",RemoteAddress=\"IPV4/UDP/141.255.164.106/5084\",Challenge=\"41d26de5\",ReceivedChallenge=\"41d26de5\",ReceivedHash=\"7a6a3a2e95a05260aee612896e1b4a39\""
      found: 1
      data:
        SRC: "141.255.164.106"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: SECURITY[6988] res_security_log.c: SecurityEvent=\"InvalidAccountID\",EventTV=\"2015-05-25T07:21:48.275+0300\",Severity=\"Error\",Service=\"PJSIP\",EventVersion=\"1\",AccountID=\"70000180\",SessionID=\"\",LocalAddress=\"IPV4/UDP/127.0.0.1/5060\",RemoteAddress=\"IPV4/UDP/5.6.7.8/1111\"\",LocalAddress=\"IPV4/UDP/1.2.3.4/5060\",RemoteAddress=\"IPV4/UDP/10.250.251.252/5061\""
      found: 1
      data:
        SRC: "10.250.251.252"
    - message: "Mar  1 15:35:53 pbx asterisk[2350]: WARNING[1195][C-00000b43]: Ext. s:6 in @ from-sip-external: \"Rejecting unknown SIP connection from 192.0.2.2\""
      found: 1
      data:
        SRC: "192.0.2.2"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: WARNING[12124][C-00000001] Ext. s: \"Rejecting unknown SIP connection from [2001:db8::1]:5060\""
      found: 1
      data:
        SRC: "2001:db8::1"
    - message: "Jul 12 08:15:50 vixen42 asterisk[123]: NOTICE[19388] res_pjsip/pjsip_distributor.c: Request from '\"1000\" <sip:1000@10.0.0.1>' failed for '1.2.3.4:48336' (callid: 276666022) - No matching endpoint found"
      found: 1
      data:
        SRC: "1.2.3.4"
  negative:
    - message: "Jul 12 08:25:49 vixen42 asterisk[123]: NOTICE[1638] chan_sip.c: Peer '301' is now Reachable. (13ms / 2000ms)"
      found: 0
      undefed: ["SRC"]
    - message: "Jul 12 08:25:49 vixen42 asterisk[123]: VERBOSE[1638]: chan_sip.c:23731 handle_response_register: Registered SIP '301' at 1.2.3.4:36998"
      found: 0
      undefed: ["SRC"]
