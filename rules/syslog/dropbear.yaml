---
# Matches dropbear auth failures. Based on the fail2ban dropbear filter,
# translated to Baphomet and simplified.
daemons:
  - dropbear
message_regexp:
  - '^[Ll]ogin attempt for nonexistent user (?:''.*'' )?from (?:::ffff:)?%%%%SRC%%%%:\d+$'
  - '^[Bb]ad (?:PAM )?password attempt for .+ from (?:::ffff:)?%%%%SRC%%%%(?::\d+)?$'
  - '^[Ee]xit before auth \(user ''.+'', \d+ fails\): Max auth tries reached - user ''.+'' from (?:::ffff:)?%%%%SRC%%%%:\d+\s*$'
ban_var:
  - SRC
tests:
  positive:
    - message: "Mar 24 15:25:51 buffalo1 dropbear[4092]: bad password attempt for 'root' from 198.51.100.87:5543"
      found: 1
      data:
        SRC: "198.51.100.87"
    - message: "Feb 11 15:23:17 dropbear[1252]: login attempt for nonexistent user from ::ffff:198.51.100.215:60495"
      found: 1
      data:
        SRC: "198.51.100.215"
    - message: "Jul 27 01:04:12 fail2ban-test dropbear[1335]: Bad password attempt for 'root' from 1.2.3.4:60588"
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Jul 27 01:04:22 fail2ban-test dropbear[1335]: Exit before auth (user 'root', 10 fails): Max auth tries reached - user 'root' from 1.2.3.4:60588"
      found: 1
      data:
        SRC: "1.2.3.4"
    - message: "Jul 27 01:18:59 fail2ban-test dropbear[1477]: Login attempt for nonexistent user from 1.2.3.4:60794"
      found: 1
      data:
        SRC: "1.2.3.4"
  negative:
    - message: "Jul 27 01:20:00 fail2ban-test dropbear[1477]: Password auth succeeded for 'kitsune' from 192.0.2.9:60794"
      found: 0
      undefed: ["SRC"]
    - message: "Jul 27 01:20:01 fail2ban-test sshd[1477]: Bad password attempt for 'root' from 1.2.3.4:60588"
      found: 0
      undefed: ["SRC"]
