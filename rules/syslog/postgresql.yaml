---
# Matches PostgreSQL password authentication failures. No fail2ban filter
# exists for this, so it is modelled on Sagan's postgresql.rules and
# PostgreSQL's own output. Requires postgres to log through syslog
# (`log_destination = syslog`) AND `log_line_prefix` to include `%h` (with
# `log_connections = on`) so the client address rides on the failure line...
# without `%h` there is no offender on the line and nothing to banish. Two
# patterns because `%h` renders differently by position: the `%q...host=`
# idiom (`host=1.2.3.4`) versus a bare address field just before FATAL.
msg: "[POSTGRESQL] password authentication failure"
severity: high
classtype: brute-force
daemons:
  - postgres
message_regexp:
  - '\bhost=%%%%SRC%%%%\b.*\bpassword authentication failed for user'
  - '\b%%%%SRC%%%% (?:FATAL|LOG):\s+password authentication failed for user'
ban_var:
  - SRC
tests:
  positive:
    - message: 'Jul 14 08:15:50 dbhost postgres[12345]: 2026-07-14 08:15:50.123 UTC [12345] bob@maindb 203.0.113.10 FATAL:  password authentication failed for user "bob"'
      found: 1
      data:
        SRC: "203.0.113.10"
    - message: 'Jul 14 08:15:50 dbhost postgres[12345]: 2026-07-14 08:15:50.123 UTC [12345] user=bob,db=maindb,host=198.51.100.5 FATAL:  password authentication failed for user "bob"'
      found: 1
      data:
        SRC: "198.51.100.5"
    - message: 'Jul 14 08:15:50 dbhost postgres[12345]: 2026-07-14 08:15:50.123 UTC [12345] app@db 2001:db8::1 FATAL:  password authentication failed for user "app"'
      found: 1
      data:
        SRC: "2001:db8::1"
  negative:
    - message: 'Jul 14 08:16:00 dbhost postgres[12345]: 2026-07-14 08:16:00.001 UTC [12345] bob@maindb 203.0.113.10 LOG:  connection authorized: user=bob database=maindb'
      found: 0
      undefed: ["SRC"]
    - message: 'Jul 14 08:16:00 dbhost postgres[12345]: 2026-07-14 08:16:00.001 UTC [12345] FATAL:  password authentication failed for user "bob"'
      found: 0
      undefed: ["SRC"]
