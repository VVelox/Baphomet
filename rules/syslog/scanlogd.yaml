---
# Matches port scans detected by scanlogd. Based on the fail2ban scanlogd
# filter, translated to Baphomet and simplified.
msg: "[SCANLOGD] port scan detected"
severity: medium
classtype: attempted-recon
daemons:
  - scanlogd
message_regexp:
  - '^%%%%SRC%%%%(?::\d+)? to \S+ ports\b'
ban_var:
  - SRC
tests:
  positive:
    - message: "Mar  5 21:44:43 srv scanlogd: 192.0.2.123 to 192.0.2.1 ports 80, 81, 83, 88, 99, 443, 1080, 3128, ..., f????uxy, TOS 00, TTL 49 @20:44:43"
      found: 1
      data:
        SRC: "192.0.2.123"
    - message: "Mar  5 21:44:44 srv scanlogd: 192.0.2.123 to 192.0.2.1 ports 497, 515, 544, 543, 464, 513, ..., fSrpauxy, TOS 00 @09:04:25"
      found: 1
      data:
        SRC: "192.0.2.123"
  negative:
    - message: "Mar  5 21:44:47 srv scanlogd: 192.0.2.123 connected to 192.0.2.1"
      found: 0
      undefed: ["SRC"]
