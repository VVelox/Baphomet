---
# Matches perdition proxy authentication failures. Based on the fail2ban
# perdition filter, translated to Baphomet and simplified. perdition logs
# as perdition.<protocol>, such as perdition.imaps, so the daemon gate is a
# regexp.
msg: "[PERDITION] authentication failure"
severity: high
classtype: brute-force
daemons:
  - '//^perdition\.//'
message_regexp:
  - '^Auth: %%%%SRC%%%%:\d+->(?:\d{1,3}\.){3}\d{1,3}:\d+ client-secure=\S+ authorisation_id=NONE authentication_id=".+" server="\S+" protocol=\S+ server-secure=\S+ status="failed: (?:local authentication failure|Re-Authentication Failure)"$'
  - '^Fatal Error reading authentication information from client %%%%SRC%%%%:\d+->(?:\d{1,3}\.){3}\d{1,3}:\d+: Exiting child$'
ban_var:
  - SRC
tests:
  positive:
    - message: "Jul 18 16:07:18 ares perdition.imaps[3194]: Auth: 192.168.8.100:2274->193.48.191.9:993 client-secure=ssl authorisation_id=NONE authentication_id=\"carles\" server=\"imap.biotoul.fr:993\" protocol=IMAP4S server-secure=ssl status=\"failed: Re-Authentication Failure\""
      found: 1
      data:
        SRC: "192.168.8.100"
    - message: "Jul 18 16:08:58 ares perdition.imaps[3194]: Fatal Error reading authentication information from client 192.168.8.100:2274->193.48.191.9:993: Exiting child"
      found: 1
      data:
        SRC: "192.168.8.100"
  negative:
    - message: "Jul 12 08:25:49 ares perdition.imaps[3194]: Auth: 192.168.8.100:2274->193.48.191.9:993 client-secure=ssl authorisation_id=NONE authentication_id=\"carles\" server=\"imap.biotoul.fr:993\" protocol=IMAP4S server-secure=ssl status=\"ok\""
      found: 0
      undefed: ["SRC"]
    - message: "Jul 12 08:25:49 ares perdition[3194]: Fatal Error reading authentication information from client 192.168.8.100:2274->193.48.191.9:993: Exiting child"
      found: 0
      undefed: ["SRC"]
