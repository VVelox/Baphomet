---
# Matches Traefik basic-auth failures in its access log: a request that
# came back 401 while carrying a username. Based on fail2ban's
# traefik-auth filter in its normal mode, translated to Baphomet.
#
# This is a raw rule rather than an http one because Traefik's access
# log is its own format... a CLF-like prefix followed by extra
# duration, frontend, and timing fields that the http_access parser
# does not accept. The whole line is matched here instead. The
# ddos/aggressive modes (empty-user form) are not ported; normal mode
# requires the username present.
#
# Source: fail2ban config/filter.d/traefik-auth.conf
message_regexp:
  - '^%%%%SRC%%%% - (?!- )\S+ \[[^\]]*\] "[A-Z]+ [^"]*" 401\b'
ban_var:
  - SRC
tests:
  positive:
    - message: '10.0.0.2 - username [18/Nov/2018:21:34:34 +0000] "GET /dashboard/ HTTP/2.0" 401 17 "-" "Mozilla/5.0 (X11; Linux x86_64; rv:57.0) Gecko/20100101 Firefox/57.0" 72 "Auth for frontend-Host-traefik-0" "/dashboard/" 0ms'
      found: 1
      data:
        SRC: "10.0.0.2"
    # any request method, not just GET
    - message: '10.0.0.2 - username [18/Nov/2018:21:34:34 +0000] "TRACE /dashboard/ HTTP/2.0" 401 17 "-" "Mozilla/5.0 (X11; Linux x86_64; rv:57.0) Gecko/20100101 Firefox/57.0" 72 "Auth for frontend-Host-traefik-0" "/dashboard/" 0ms'
      found: 1
      data:
        SRC: "10.0.0.2"
  negative:
    # ddos form, no username offered... not a normal-mode offense
    - message: '10.0.0.2 - - [18/Nov/2018:21:34:30 +0000] "GET /dashboard/ HTTP/2.0" 401 17 "-" "Mozilla/5.0 (X11; Linux x86_64; rv:57.0) Gecko/20100101 Firefox/57.0" 72 "Auth for frontend-Host-traefik-0" "/dashboard/" 0ms'
      found: 0
      undefed: ["SRC"]
    # succeeded, 200... not an offense
    - message: '10.0.0.2 - username [27/Nov/2018:23:33:31 +0000] "GET /dashboard/ HTTP/2.0" 200 716 "-" "Mozilla/5.0 (X11; Linux x86_64; rv:57.0) Gecko/20100101 Firefox/57.0" 118 "Host-traefik-0" "/dashboard/" 4ms'
      found: 0
      undefed: ["SRC"]
