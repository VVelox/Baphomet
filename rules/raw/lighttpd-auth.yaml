---
# Matches lighttpd mod_auth / http_auth password failures. Based on the
# fail2ban lighttpd-auth filter, translated to Baphomet. lighttpd writes
# its own timestamp (YYYY-MM-DD HH:MM:SS) rather than a syslog prefix, so
# this is a raw rule anchored on that timestamp. The IP is always the bare
# trailing "IP: ..." field, so %%%%SRC%%%% is pinned there.
message_regexp:
  - '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}: \(?(?:http|mod)_auth\.c\.\d+\) (?:password doesn''t match for (?:\S+|.*?) username:\s+(?:\S+|.*?)\s*|digest: auth failed(?: for\s+(?:\S+|.*?)\s*)?: (?:wrong password|uri mismatch \([^)]*\))|get_password failed),? IP: %%%%SRC%%%%\s*$'
ban_var:
  - SRC
tests:
  positive:
    - message: "2011-12-25 17:09:20: (http_auth.c.875) password doesn't match for /gitweb/ username: francois, IP: 4.4.4.4"
      found: 1
      data:
        SRC: "4.4.4.4"
    - message: "2012-09-26 10:24:35: (http_auth.c.1136) digest: auth failed for  xxx : wrong password, IP: 4.4.4.4"
      found: 1
      data:
        SRC: "4.4.4.4"
    - message: "2013-08-25 00:24:55: (http_auth.c.877) get_password failed, IP: 4.4.4.4"
      found: 1
      data:
        SRC: "4.4.4.4"
    - message: "2021-09-30 16:05:33: mod_auth.c.828) password doesn't match for /secure/ username: test IP: 192.0.2.2"
      found: 1
      data:
        SRC: "192.0.2.2"
    - message: "2021-09-30 17:44:37: (mod_auth.c.791) digest: auth failed: uri mismatch (/uri1 != /uri2), IP: 192.0.2.4"
      found: 1
      data:
        SRC: "192.0.2.4"
  negative:
    - message: "2011-12-25 17:10:00: (http_auth.c.875) password verified for /gitweb/ username: francois, IP: 4.4.4.4"
      found: 0
      undefed: ["SRC"]
