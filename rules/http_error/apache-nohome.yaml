---
# Matches Apache requests probing for home directories that do not
# exist, the /~user sort. Based on the fail2ban apache-nohome filter,
# translated to Baphomet and simplified. No level gate, as httpd 2.4
# logs this at core:info while 2.2 logs it at error.
message_regexp:
  - '^File does not exist: .*/~'
# fail2ban jail.conf's word for this filter, honored when the kur allows
# per-rule thresholds
max_retrys: 2
tests:
  positive:
    - message: '[Sat Jun 01 11:23:08 2013] [error] [client 1.2.3.4] File does not exist: /xxx/~'
      found: 1
      data:
        client: "1.2.3.4"
    - message: '[Thu Jun 27 11:55:44.569531 2013] [core:info] [pid 4101:tid 2992634688] [client 192.0.2.12:46652] AH00128: File does not exist: /xxx/~'
      found: 1
      data:
        client: "192.0.2.12"
        level: "info"
        module: "core"
        code: "AH00128"
  negative:
    # a missing file with no home directory tilde in the path
    - message: '[Sat Jun 01 02:17:42 2013] [error] [client 192.168.33.1] File does not exist: /var/www/html/index.html'
      found: 0
      undefed: ["client"]
    # no client at all
    - message: '[Sat Jun 01 02:17:43 2013] [notice] Apache/2.4.57 (FreeBSD) configured -- resuming normal operations'
      found: 0
      undefed: ["client"]
